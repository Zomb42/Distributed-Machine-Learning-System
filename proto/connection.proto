syntax = "proto3";

package demo;

message PingRequest {
  string message = 1;
  int64 client_time_ms = 2;
}

message PingReply {
  string message = 1;
  string server_hostname = 2;
  int64 server_time_ms = 3;
}

message MockTaskRequest {
  string worker_name = 1;
}

message MockTaskReply {
  string task_id = 1;
  string dataset_name = 2;
  int32 shard_index = 3;
  int32 total_shards = 4;
  int32 epochs = 5;
  int32 batch_size = 6;
  double learning_rate = 7;
  string notes = 8;
}

service ConnectionService {
  rpc Ping(PingRequest) returns (PingReply);
  rpc GetMockTask(MockTaskRequest) returns (MockTaskReply);
}
